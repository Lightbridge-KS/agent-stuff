name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Validate skills, manifests, scripts, and hooks
        run: uv run bin/validate.py
      - name: Run installer tests
        run: uv run tests/test_install.py
      - name: Run hook tests
        run: uv run tests/test_hooks.py
      - name: Run lightbridge tests
        run: uv run tests/test_lightbridge.py
      - name: Run handoff-hook tests
        run: uv run tests/test_handoff_hook.py
      - name: Run repo-links tests
        run: uv run tests/test_repo_links.py
      - name: Run packager tests
        run: uv run tests/test_package.py
      - name: Run research-kit tests
        run: uv run tests/test_research_kit.py
      - name: Run plan-store tests
        run: uv run tests/test_plan_store.py
      - name: Run notebook-tools tests
        run: uv run tests/test_notebook_tools.py
      - name: Syntax-check all Python (bin, scripts, hooks, tests)
        run: |
          uv run python -m py_compile \
            bin/install.py bin/validate.py bin/package.py \
            scripts/*/*.py hooks/*/*.py tests/*.py \
            scripts/notebook-tools/notebook_tools/*.py \
            plugins/research/skills/research/scripts/research_kit.py
