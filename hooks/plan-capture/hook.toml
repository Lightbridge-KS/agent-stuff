# Agent-neutral hook descriptor. `bin/install.py --hooks` renders this into each
# agent's native registration block (Claude settings.json, Codex hooks.json / config.toml).
event = "PostToolUse"
command = "hook.py"                  # relative to this folder; installer resolves to absolute
matcher = "ExitPlanMode"             # fires only on the plan-approval tool
statusMessage = "Filing approved plan"  # optional; Codex shows it, Claude ignores it
